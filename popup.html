<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #fff;
      padding: 8px 12px 14px;
      user-select: none;
    }
    .header {
      text-align: center;
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 2px 0;
    }
    .gauge-wrap {
      position: relative;
      cursor: pointer;
    }
    #gauge {
      display: block;
      width: 100%;
      height: auto;
    }
    .presets {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .preset-btn {
      flex: 1;
      padding: 6px 0;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: #1a1a1a;
      color: #888;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }
    .preset-btn:hover {
      background: #252525;
      border-color: #444;
      color: #ccc;
    }
    .preset-btn.active {
      background: #065fd4;
      border-color: #065fd4;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header" id="header"></div>
  <div class="gauge-wrap">
    <svg viewBox="0 0 260 220" id="gauge"></svg>
  </div>
  <div class="presets" id="presets"></div>
  <script src="popup.js"></script>
</body>
</html>
